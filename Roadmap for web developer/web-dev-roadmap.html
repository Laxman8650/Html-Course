<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Dev Roadmap — 8 Months</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080b14;
        --surface: #0e1424;
        --card: #111827;
        --border: rgba(99, 102, 241, 0.18);
        --blue: #6366f1;
        --purple: #a855f7;
        --cyan: #22d3ee;
        --green: #10b981;
        --green-dim: #064e3b;
        --text: #e2e8f0;
        --muted: #64748b;
        --done-bg: rgba(16, 185, 129, 0.07);
        --done-border: rgba(16, 185, 129, 0.35);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Background mesh ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 60% 50% at 10% 20%,
            rgba(99, 102, 241, 0.12) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 40% at 90% 80%,
            rgba(168, 85, 247, 0.1) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 40% 30% at 50% 50%,
            rgba(34, 211, 238, 0.04) 0%,
            transparent 60%
          );
        pointer-events: none;
      }

      /* ── Grid dots ── */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image: radial-gradient(
          rgba(99, 102, 241, 0.15) 1px,
          transparent 1px
        );
        background-size: 32px 32px;
        pointer-events: none;
        mask-image: linear-gradient(
          to bottom,
          transparent,
          black 15%,
          black 85%,
          transparent
        );
      }

      main {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        padding: 60px 20px 100px;
      }

      /* ── Header ── */
      .hero {
        text-align: center;
        margin-bottom: 56px;
        animation: fadeUp 0.7s ease both;
      }
      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: "Syne", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--blue);
        background: rgba(99, 102, 241, 0.1);
        border: 1px solid rgba(99, 102, 241, 0.25);
        padding: 6px 14px;
        border-radius: 999px;
        margin-bottom: 24px;
      }
      .hero-tag span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--blue);
        display: block;
        animation: pulse 2s ease infinite;
      }
      .hero h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(2.2rem, 5vw, 3.2rem);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.02em;
        background: linear-gradient(
          135deg,
          #fff 30%,
          var(--blue) 60%,
          var(--purple) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 14px;
      }
      .hero p {
        font-size: 1rem;
        color: var(--muted);
        font-weight: 300;
      }

      /* ── Progress Bar ── */
      .progress-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 28px;
        margin-bottom: 48px;
        display: flex;
        align-items: center;
        gap: 20px;
        animation: fadeUp 0.7s 0.1s ease both;
      }
      .progress-info {
        flex: 1;
      }
      .progress-label {
        font-family: "Syne", sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .progress-bar {
        height: 6px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--blue), var(--purple));
        border-radius: 999px;
        width: 0%;
        transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 0 12px rgba(99, 102, 241, 0.5);
      }
      .progress-count {
        font-family: "Syne", sans-serif;
        font-size: 1.8rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--blue), var(--purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        white-space: nowrap;
      }

      /* ── Month Section ── */
      .month-section {
        margin-bottom: 36px;
        animation: fadeUp 0.6s ease both;
      }
      .month-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
      }
      .month-badge {
        font-family: "Syne", sans-serif;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        white-space: nowrap;
      }
      .month-title {
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
      }
      .month-divider {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, var(--border), transparent);
      }

      /* ── Topic Cards ── */
      .topic-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 16px;
        cursor: pointer;
        transition:
          border-color 0.25s,
          background 0.25s,
          transform 0.18s,
          box-shadow 0.25s;
        user-select: none;
        position: relative;
        overflow: hidden;
      }
      .topic-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--blue), var(--purple));
        border-radius: 3px 0 0 3px;
        opacity: 0;
        transition: opacity 0.25s;
      }
      .topic-card:hover {
        border-color: rgba(99, 102, 241, 0.45);
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(99, 102, 241, 0.1);
      }
      .topic-card:hover::before {
        opacity: 1;
      }

      /* Completed state */
      .topic-card.done {
        background: var(--done-bg);
        border-color: var(--done-border);
        transform: none;
        box-shadow: none;
      }
      .topic-card.done::before {
        background: var(--green);
        opacity: 1;
      }

      /* Custom Checkbox */
      .checkbox {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: 2px solid rgba(99, 102, 241, 0.45);
        flex-shrink: 0;
        display: grid;
        place-items: center;
        transition:
          border-color 0.2s,
          background 0.2s;
        background: transparent;
      }
      .checkbox svg {
        width: 13px;
        height: 13px;
        stroke: #fff;
        stroke-width: 2.5;
        stroke-dasharray: 20;
        stroke-dashoffset: 20;
        transition: stroke-dashoffset 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .topic-card.done .checkbox {
        background: var(--green);
        border-color: var(--green);
      }
      .topic-card.done .checkbox svg {
        stroke-dashoffset: 0;
      }

      /* Text */
      .topic-text {
        flex: 1;
      }
      .topic-name {
        font-size: 0.92rem;
        font-weight: 500;
        color: var(--text);
        transition: color 0.25s;
      }
      .topic-card.done .topic-name {
        text-decoration: line-through;
        color: var(--muted);
      }
      .topic-tag {
        display: inline-block;
        font-size: 0.65rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--cyan);
        background: rgba(34, 211, 238, 0.08);
        border: 1px solid rgba(34, 211, 238, 0.2);
        border-radius: 4px;
        padding: 2px 7px;
        margin-top: 4px;
      }
      .topic-card.done .topic-tag {
        color: var(--green);
        background: rgba(16, 185, 129, 0.08);
        border-color: rgba(16, 185, 129, 0.25);
      }

      .done-badge {
        font-family: "Syne", sans-serif;
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--green);
        opacity: 0;
        transition: opacity 0.3s;
        white-space: nowrap;
      }
      .topic-card.done .done-badge {
        opacity: 1;
      }

      /* ── Project card ── */
      .project-card {
        background: rgba(99, 102, 241, 0.05);
        border: 1px dashed rgba(99, 102, 241, 0.3);
        border-radius: 10px;
        padding: 12px 18px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 14px;
        cursor: pointer;
        transition: all 0.25s;
        user-select: none;
        position: relative;
        overflow: hidden;
      }
      .project-card:hover {
        border-color: rgba(99, 102, 241, 0.6);
        background: rgba(99, 102, 241, 0.09);
      }
      .project-card.done {
        background: rgba(16, 185, 129, 0.05);
        border-color: rgba(16, 185, 129, 0.3);
      }
      .project-card .checkbox {
        border-color: rgba(168, 85, 247, 0.5);
      }
      .project-card.done .checkbox {
        background: var(--green);
        border-color: var(--green);
      }
      .project-icon {
        font-size: 1rem;
        flex-shrink: 0;
        display: none;
      }
      .project-label {
        font-size: 0.8rem;
        font-weight: 300;
        font-style: italic;
        color: var(--purple);
        transition: color 0.25s;
      }
      .project-card.done .project-label {
        text-decoration: line-through;
        color: var(--muted);
      }

      /* ── Confetti burst (CSS only) ── */
      @keyframes confetti-pop {
        0% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
        80% {
          transform: scale(1.6) rotate(20deg);
          opacity: 0.7;
        }
        100% {
          transform: scale(0) rotate(40deg);
          opacity: 0;
        }
      }

      /* ── Animations ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ── Reset button ── */
      .reset-btn {
        display: block;
        margin: 48px auto 0;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 0.82rem;
        padding: 10px 24px;
        border-radius: 999px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .reset-btn:hover {
        border-color: rgba(239, 68, 68, 0.45);
        color: #f87171;
        background: rgba(239, 68, 68, 0.05);
      }

      /* Responsive */
      @media (max-width: 600px) {
        .progress-wrap {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }
        .progress-count {
          font-size: 1.4rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <!-- Hero -->
      <div class="hero">
        <div class="hero-tag"><span></span> Learning Roadmap</div>
        <h1>Web Developer<br />8-Month Journey</h1>
        <p>Topic complete karo → card green ho jayega ✅</p>
      </div>

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-info">
          <div class="progress-label">Overall Progress</div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
        <div class="progress-count" id="progressCount">0/34</div>
      </div>

      <!-- Months -->
      <div id="roadmap"></div>

      <button class="reset-btn" onclick="resetAll()">🔄 Reset Progress</button>
    </main>

    <script>
      const roadmap = [
        {
          month: 1,
          title: "HTML + CSS",
          topics: [
            {
              id: "m1t1",
              name: "HTML: Semantic tags, forms, tables, media",
              tag: "HTML",
            },
            { id: "m1t2", name: "CSS: Box model, Flexbox, Grid", tag: "CSS" },
            {
              id: "m1t3",
              name: "Responsive design & media queries",
              tag: "CSS",
            },
          ],
          project: { id: "m1p", label: "Project: Static Portfolio Page" },
        },
        {
          month: 2,
          title: "CSS Advanced + Tools",
          topics: [
            {
              id: "m2t1",
              name: "CSS animations, transitions & variables",
              tag: "CSS",
            },
            { id: "m2t2", name: "Tailwind CSS basics", tag: "CSS" },
            { id: "m2t3", name: "Browser DevTools use karna", tag: "Tools" },
          ],
          project: {
            id: "m2p",
            label: "Project: Landing Page Clone (Netflix/Spotify)",
          },
        },
        {
          month: 3,
          title: "JavaScript Core",
          topics: [
            {
              id: "m3t1",
              name: "Variables, loops, functions, arrays, objects",
              tag: "JS",
            },
            { id: "m3t2", name: "DOM manipulation & events", tag: "JS" },
            { id: "m3t3", name: "Type coercion, scope & closures", tag: "JS" },
          ],
          project: { id: "m3p", label: "Project: Todo App & Calculator" },
        },
        {
          month: 4,
          title: "JavaScript Advanced",
          topics: [
            {
              id: "m4t1",
              name: "ES6+: Arrow functions, destructuring, spread, modules",
              tag: "JS",
            },
            {
              id: "m4t2",
              name: "Async/Await, Fetch API & Promises",
              tag: "JS",
            },
            {
              id: "m4t3",
              name: "LocalStorage, JSON & error handling",
              tag: "JS",
            },
          ],
          project: { id: "m4p", label: "Project: Weather App (Real API)" },
        },
        {
          month: 5,
          title: "React",
          topics: [
            { id: "m5t1", name: "Components, props & state", tag: "React" },
            {
              id: "m5t2",
              name: "useState, useEffect & useContext",
              tag: "React",
            },
            {
              id: "m5t3",
              name: "React Router & conditional rendering",
              tag: "React",
            },
          ],
          project: { id: "m5p", label: "Project: Movie Search App / Blog UI" },
        },
        {
          month: 6,
          title: "React Advanced + State",
          topics: [
            {
              id: "m6t1",
              name: "Redux Toolkit ya Zustand (global state)",
              tag: "React",
            },
            { id: "m6t2", name: "Custom Hooks banana", tag: "React" },
            {
              id: "m6t3",
              name: "Performance: useMemo & useCallback",
              tag: "React",
            },
          ],
          project: { id: "m6p", label: "Project: Full E-commerce Frontend" },
        },
        {
          month: 7,
          title: "Backend — Node.js + Express",
          topics: [
            { id: "m7t1", name: "Node.js basics & Express setup", tag: "Node" },
            {
              id: "m7t2",
              name: "REST API: GET, POST, PUT, DELETE",
              tag: "Node",
            },
            { id: "m7t3", name: "MongoDB + Mongoose (database)", tag: "DB" },
            {
              id: "m7t4",
              name: "JWT auth, bcrypt & middleware",
              tag: "Security",
            },
          ],
          project: { id: "m7p", label: "Project: Full CRUD API with Auth" },
        },
        {
          month: 8,
          title: "Full-Stack + Job Ready",
          topics: [
            {
              id: "m8t1",
              name: "Frontend + Backend connect karo",
              tag: "Full-Stack",
            },
            {
              id: "m8t2",
              name: "Deploy: Vercel (frontend) + Railway/Render (backend)",
              tag: "Deploy",
            },
            { id: "m8t3", name: "TypeScript basics (bonus)", tag: "TS" },
            {
              id: "m8t4",
              name: "Portfolio finalize — 3-4 strong projects",
              tag: "Career",
            },
            {
              id: "m8t5",
              name: "GitHub clean karo, LinkedIn update karo",
              tag: "Career",
            },
            {
              id: "m8t6",
              name: "DSA basics: arrays, strings, objects (interviews)",
              tag: "DSA",
            },
          ],
          project: {
            id: "m8p",
            label: "Project: Full-Stack App (Deployed & Live)",
          },
        },
      ];

      // Count total checkable items
      const TOTAL = roadmap.reduce((acc, m) => acc + m.topics.length + 1, 0);

      // Load state
      function getState() {
        try {
          return JSON.parse(localStorage.getItem("wdr8") || "{}");
        } catch {
          return {};
        }
      }
      function saveState(state) {
        try {
          localStorage.setItem("wdr8", JSON.stringify(state));
        } catch {}
      }

      let state = getState();

      function updateProgress() {
        const done = Object.values(state).filter(Boolean).length;
        const pct = Math.round((done / TOTAL) * 100);
        document.getElementById("progressFill").style.width = pct + "%";
        document.getElementById("progressCount").textContent =
          `${done}/${TOTAL}`;
      }

      function toggle(id, cardEl) {
        state[id] = !state[id];
        saveState(state);
        cardEl.classList.toggle("done", !!state[id]);
        updateProgress();
      }

      function buildRoadmap() {
        const container = document.getElementById("roadmap");
        container.innerHTML = "";

        roadmap.forEach((m, idx) => {
          const section = document.createElement("div");
          section.className = "month-section";
          section.style.animationDelay = `${0.05 * idx + 0.15}s`;

          // Header
          section.innerHTML = `
      <div class="month-header">
        <div class="month-badge">Month ${m.month}</div>
        <div class="month-title">${m.title}</div>
        <div class="month-divider"></div>
      </div>`;

          // Topics
          m.topics.forEach((t) => {
            const card = document.createElement("div");
            card.className = "topic-card" + (state[t.id] ? " done" : "");
            card.innerHTML = `
        <div class="checkbox">
          <svg viewBox="0 0 12 10"><polyline points="1,5 4.5,9 11,1"/></svg>
        </div>
        <div class="topic-text">
          <div class="topic-name">${t.name}</div>
          <div class="topic-tag">${t.tag}</div>
        </div>
        <div class="done-badge">✓ Done</div>`;
            card.addEventListener("click", () => toggle(t.id, card));
            section.appendChild(card);
          });

          // Project
          const pCard = document.createElement("div");
          pCard.className =
            "project-card" + (state[m.project.id] ? " done" : "");
          pCard.innerHTML = `
      <div class="checkbox">
        <svg viewBox="0 0 12 10"><polyline points="1,5 4.5,9 11,1"/></svg>
      </div>
      <div class="project-label">🚀 ${m.project.label}</div>
      <div class="done-badge" style="margin-left:auto">✓ Built</div>`;
          pCard.addEventListener("click", () => toggle(m.project.id, pCard));
          section.appendChild(pCard);

          container.appendChild(section);
        });

        updateProgress();
      }

      function resetAll() {
        if (confirm("Saari progress reset kar dein? 🥺")) {
          state = {};
          saveState(state);
          buildRoadmap();
        }
      }

      buildRoadmap();
    </script>
  </body>
</html>
